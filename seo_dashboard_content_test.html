<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO Content Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
/* ── RESET & BASE ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --white:   #ffffff;
  --bg:      #f7f6f3;
  --surface: #ffffff;
  --border:  #e8e6e0;
  --border2: #d4d0c8;
  --text:    #1a1916;
  --muted:   #7a7770;
  --faint:   #b0ada6;

  /* Project colors */
  --ferro:   #2563eb;   /* ferrolip — blue  */
  --ferro-bg:#eff6ff;
  --bio:     #16a34a;   /* biolizin — green */
  --bio-bg:  #f0fdf4;

  /* Status */
  --done:    #16a34a;
  --doing:   #d97706;
  --todo:    #94a3b8;
  --late:    #dc2626;

  --radius:  10px;
  --shadow:  0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.04);
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Instrument Sans', sans-serif;
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
}

/* ── HEADER ── */
.topbar {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 0 32px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.topbar-left { display: flex; align-items: center; gap: 20px; }
.brand { font-family: 'Instrument Serif', serif; font-size: 18px; color: var(--text); letter-spacing: -.3px; }
.brand em { font-style: italic; color: var(--muted); }
.divider-v { width: 1px; height: 20px; background: var(--border); }
.page-title { font-size: 13px; color: var(--muted); font-weight: 500; }

/* Month filter */
.month-strip { display: flex; align-items: center; gap: 2px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 3px; }
.m-btn { border: none; background: none; font-family: inherit; font-size: 12px; font-weight: 500; color: var(--muted); padding: 4px 11px; border-radius: 6px; cursor: pointer; transition: all .15s; }
.m-btn:hover { color: var(--text); background: var(--white); }
.m-btn.active { background: var(--white); color: var(--text); box-shadow: var(--shadow); }

/* ── MAIN LAYOUT ── */
.main { padding: 24px 32px 60px; max-width: 1360px; }

/* ── SECTION HEADERS ── */
.section-head {
  display: flex; align-items: center; gap: 10px;
  margin: 28px 0 14px;
}
.section-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.section-label { font-size: 11px; font-weight: 600; letter-spacing: .8px; text-transform: uppercase; color: var(--muted); }
.section-line { flex: 1; height: 1px; background: var(--border); }

/* Project tabs */
.proj-tabs { display: flex; gap: 6px; margin-bottom: 16px; }
.proj-tab {
  padding: 6px 16px; border-radius: 99px; font-size: 12px; font-weight: 600;
  cursor: pointer; border: 1.5px solid transparent; transition: all .15s;
  background: none; font-family: inherit;
}
.proj-tab[data-proj="ferrolip"] { color: var(--ferro); border-color: #bfdbfe; }
.proj-tab[data-proj="ferrolip"]:hover,
.proj-tab[data-proj="ferrolip"].active { background: var(--ferro-bg); border-color: var(--ferro); }
.proj-tab[data-proj="biolizin"] { color: var(--bio); border-color: #bbf7d0; }
.proj-tab[data-proj="biolizin"]:hover,
.proj-tab[data-proj="biolizin"].active { background: var(--bio-bg); border-color: var(--bio); }

/* ── CARDS ── */
.card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
}
.card-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }
.card-title span { font-size: 11px; font-weight: 500; color: var(--muted); }

/* ── KPI ROW ── */
.kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
.kpi {
  background: var(--white); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px 18px;
  box-shadow: var(--shadow);
}
.kpi-label { font-size: 11px; color: var(--muted); font-weight: 500; margin-bottom: 6px; }
.kpi-val { font-size: 28px; font-weight: 600; line-height: 1; color: var(--text); }
.kpi-sub { font-size: 11px; color: var(--muted); margin-top: 5px; }
.kpi-sub b { font-weight: 600; }

/* ── GRID LAYOUTS ── */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
.grid-60-40 { display: grid; grid-template-columns: 1.5fr 1fr; gap: 14px; }

/* ── TABLE ── */
.tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
.tbl th { font-size: 11px; font-weight: 600; color: var(--muted); text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); letter-spacing: .4px; text-transform: uppercase; white-space: nowrap; }
.tbl td { padding: 9px 10px; border-bottom: 1px solid #f3f2ef; vertical-align: middle; }
.tbl tr:last-child td { border-bottom: none; }
.tbl tr:hover td { background: #fafaf8; }
.tbl-wrap { max-height: 320px; overflow-y: auto; }
.tbl-wrap::-webkit-scrollbar { width: 4px; }
.tbl-wrap::-webkit-scrollbar-track { background: transparent; }
.tbl-wrap::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

/* ── STATUS PILL ── */
.pill { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 99px; white-space: nowrap; }
.pill-done  { background: #dcfce7; color: #15803d; }
.pill-doing { background: #fef3c7; color: #b45309; }
.pill-todo  { background: #f1f5f9; color: #64748b; }
.pill-late  { background: #fee2e2; color: #b91c1c; }
.pill-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

/* ── STAFF PROGRESS BARS ── */
.staff-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid #f3f2ef; }
.staff-row:last-child { border-bottom: none; }
.staff-avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
.staff-name { width: 72px; font-size: 13px; font-weight: 500; flex-shrink: 0; }
.bar-track { flex: 1; height: 6px; background: #f1f0ec; border-radius: 99px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 99px; transition: width .6s cubic-bezier(.4,0,.2,1); }
.staff-meta { display: flex; gap: 8px; align-items: center; min-width: 130px; justify-content: flex-end; }
.staff-pts { font-size: 12px; font-weight: 600; color: var(--text); font-variant-numeric: tabular-nums; }
.staff-count { font-size: 11px; color: var(--muted); }

/* ── BADGE ── */
.badge { display: inline-flex; align-items: center; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 4px; }
.badge-ferro { background: var(--ferro-bg); color: var(--ferro); }
.badge-bio   { background: var(--bio-bg);   color: var(--bio); }

/* ── LOADING / ERROR ── */
.loading { display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: 13px; padding: 20px 0; }
.spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--text); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.error-box { background: #fef2f2; border: 1px solid #fecaca; border-radius: 8px; padding: 10px 14px; font-size: 12px; color: #b91c1c; margin-bottom: 12px; }

/* ── CHART WRAPPER ── */
.chart-wrap { position: relative; }

/* ── TABS (task type) ── */
.task-tabs { display: flex; gap: 2px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 3px; width: fit-content; margin-bottom: 16px; }
.t-btn { border: none; background: none; font-family: inherit; font-size: 12px; font-weight: 500; color: var(--muted); padding: 5px 14px; border-radius: 6px; cursor: pointer; transition: all .15s; }
.t-btn.active { background: var(--white); color: var(--text); box-shadow: var(--shadow); }

canvas { display: block; }
</style>
</head>

/* ══════════════════════════════════════════

let rawData = { new_content: [], audit_content: [] };
let charts  = {};

/* ══════════════════════════════════════════

   ══════════════════════════════════════════ */
const DEMO = {

    { content:'Bổ sung sắt cho trẻ sơ sinh đúng cách',   time:'02/2026', nhan_su:'Khang',  content_type:'SEO', content_action:'viết mới', status:'Done',   content_point:'1', project:'ferrolip' },

    { content:'Sắt hữu cơ vs sắt vô cơ khác nhau thế nào',time:'02/2026',nhan_su:'Linh',   content_type:'SEO', content_action:'viết mới', status:'doing',  content_point:'0', project:'ferrolip' },
    { content:'Dấu hiệu thiếu sắt ở trẻ nhỏ',            time:'03/2026', nhan_su:'Khang',  content_type:'SEO', content_action:'viết mới', status:'doing',  content_point:'0', project:'ferrolip' },

    { content:'Lysine cho trẻ biếng ăn liều dùng',        time:'01/2026', nhan_su:'Hà',     content_type:'SEO', content_action:'viết mới', status:'Done',   content_point:'1', project:'biolizin' },
    { content:'Trẻ 3 tuổi biếng ăn phải làm sao',        time:'02/2026', nhan_su:'Linh',   content_type:'SEO', content_action:'viết mới', status:'Done',   content_point:'1', project:'biolizin' },
    { content:'Nguyên nhân trẻ biếng ăn chậm tăng cân',  time:'02/2026', nhan_su:'Hà',     content_type:'SEO', content_action:'viết mới', status:'Done',   content_point:'1', project:'biolizin' },

/* ══════════════════════════════════════════
   PARSE CSV
   ══════════════════════════════════════════ */
function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  if (lines.length < 2) return [];
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g,''));
  return lines.slice(1).map(line => {
    const vals = [];
    let cur = '', inQ = false;
    for (const ch of line) {
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { vals.push(cur.trim()); cur = ''; }
      else cur += ch;
    }
    vals.push(cur.trim());
    return Object.fromEntries(headers.map((h,i) => [h, (vals[i]||'').replace(/^"|"$/g,'')]));
  }).filter(r => Object.values(r).some(v=>v));
}

/* ══════════════════════════════════════════
   FETCH
   ══════════════════════════════════════════ */
async function fetchSheet(key) {
  const url = SHEETS[key];
  if (!url) return null;
  // Thử fetch trực tiếp trước (hoạt động khi mở từ web server hoặc browser extension)
  try {
    const res = await fetch(url, { mode: 'cors' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    if (text.trim().length === 0) throw new Error('Sheet trả về rỗng');
    return parseCSV(text);
  } catch(e) {
    // Fallback: dùng proxy công khai để bypass CORS khi mở file:// local
    try {
      const proxy = 'https://corsproxy.io/?' + encodeURIComponent(url);
      const res2  = await fetch(proxy);
      if (!res2.ok) throw new Error('HTTP ' + res2.status);
      const text2 = await res2.text();
      if (text2.trim().length === 0) throw new Error('Rỗng');
      return parseCSV(text2);
    } catch(e2) {
      showError('Không tải được sheet "' + key + '". Hãy mở file bằng Live Server hoặc upload lên web. Chi tiết: ' + e.message);
      return null;
    }
  }
}

function showError(msg) {
  let box = document.getElementById('errBox');
  if (!box) {
    box = document.createElement('div');
    box.id = 'errBox'; box.className = 'error-box';
    document.querySelector('.main').prepend(box);
  }
  box.textContent = '⚠ ' + msg;
}

/* ══════════════════════════════════════════
   FILTER DATA
   ══════════════════════════════════════════ */
function normalizeStatus(s) {
  if (!s) return 'todo';
  const v = s.trim().toLowerCase();
  if (v==='done'||v==='hoàn thành'||v==='xong') return 'done';
  if (v==='doing'||v==='đang làm'||v==='in progress') return 'doing';
  if (v==='late'||v==='trễ') return 'late';
  return 'todo';
}

function getFilteredData() {
  const key  = state.task === 'new' ? 'new_content' : 'audit_content';
  const data = rawData[key];
  return data.filter(r => {
    const projMatch = state.project === 'all' || (r.project||'').toLowerCase() === state.project;
    const mVal      = (r.time||'').replace('/','/');
    const monthMatch= mVal.includes('/' + state.month) || mVal.startsWith(state.month);
    return projMatch && monthMatch;
  });
}

/* ══════════════════════════════════════════
   RENDER KPI
   ══════════════════════════════════════════ */
function renderKPI(rows) {
  const total = rows.length;
  const done  = rows.filter(r => normalizeStatus(r.status)==='done').length;
  const doing = rows.filter(r => normalizeStatus(r.status)==='doing').length;
  const pts   = rows.reduce((s,r) => s + (parseFloat(r.content_point)||0), 0);
  const pct   = total > 0 ? Math.round(done/total*100) : 0;

  document.getElementById('k-total').textContent = total;
  document.getElementById('k-total-sub').innerHTML = `<b>${pct}%</b> hoàn thành`;
  document.getElementById('k-done').textContent = done;
  document.getElementById('k-done-sub').innerHTML = `còn <b>${total-done}</b> chưa xong`;
  document.getElementById('k-doing').textContent = doing;
  document.getElementById('k-doing-sub').innerHTML = `<b>${rows.filter(r=>normalizeStatus(r.status)==='todo').length}</b> chưa bắt đầu`;
  document.getElementById('k-pts').textContent = pts.toFixed(0);
  document.getElementById('k-pts-sub').innerHTML = `TB <b>${total>0?(pts/total).toFixed(2):0}</b> điểm/bài`;
}

/* ══════════════════════════════════════════
   RENDER TABLE
   ══════════════════════════════════════════ */
function renderTable(rows) {
  const isNew = state.task === 'new';
  document.getElementById('tableCount').textContent = rows.length + ' bài';

  const head = isNew
    ? `<tr><th>Nội dung</th><th>Thời gian</th><th>Nhân sự</th><th>Loại</th><th>Trạng thái</th><th style="text-align:right">Điểm</th></tr>`
    : `<tr><th>URL</th><th>Nhóm</th><th>Thời gian</th><th>Nhân sự</th><th>Trạng thái</th><th style="text-align:right">Điểm</th></tr>`;
  document.getElementById('tableHead').innerHTML = head;

  const projColor = p => p==='ferrolip' ? 'ferro' : 'bio';
  const statusLabel = { done:'Done', doing:'Đang làm', todo:'Chưa làm', late:'Trễ hạn' };

  document.getElementById('tableBody').innerHTML = rows.length === 0
    ? `<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:24px">Không có dữ liệu</td></tr>`
    : rows.map(r => {
        const st = normalizeStatus(r.status);
        const proj = (r.project||'').toLowerCase();
        if (isNew) return `<tr>
          <td style="max-width:240px;font-weight:500;line-height:1.4">${r.content||''}</td>
          <td style="color:var(--muted);white-space:nowrap">${r.time||''}</td>
          <td><span style="font-weight:500">${r.nhan_su||''}</span></td>
          <td><span class="badge badge-${projColor(proj)}">${r.content_type||''}</span></td>
          <td><span class="pill pill-${st}"><span class="pill-dot"></span>${statusLabel[st]}</span></td>
          <td style="text-align:right;font-weight:600;color:${st==='done'?'var(--done)':'var(--muted)'}">${parseFloat(r.content_point||0).toFixed(0)}</td>
        </tr>`;
        else return `<tr>
          <td style="max-width:200px;font-size:12px;color:#2563eb;font-weight:500">${r.URL||''}</td>
          <td><span style="font-size:11px;color:var(--muted)">${r.content_group||''}</span></td>
          <td style="color:var(--muted);white-space:nowrap">${r.time||''}</td>
          <td><span style="font-weight:500">${r.nhan_su||''}</span></td>
          <td><span class="pill pill-${st}"><span class="pill-dot"></span>${statusLabel[st]}</span></td>
          <td style="text-align:right;font-weight:600;color:${st==='done'?'var(--done)':'var(--muted)'}">${parseFloat(r.content_point||0).toFixed(0)}</td>
        </tr>`;
      }).join('');
}

/* ══════════════════════════════════════════
   RENDER STAFF LIST
   ══════════════════════════════════════════ */
function renderStaff(rows) {
  const map = {};
  rows.forEach(r => {
    const n = r.nhan_su||'?';
    if (!map[n]) map[n] = { done:0, total:0, pts:0 };
    map[n].total++;
    map[n].pts += parseFloat(r.content_point||0);
    if (normalizeStatus(r.status)==='done') map[n].done++;
  });
  const staffArr = Object.entries(map).sort((a,b)=>b[1].pts-a[1].pts);
  const maxPts   = Math.max(...staffArr.map(([,v])=>v.pts), 1);
  const projColor = state.project==='biolizin' ? 'var(--bio)' : state.project==='ferrolip' ? 'var(--ferro)' : '#6366f1';

  document.getElementById('staffList').innerHTML = staffArr.length === 0
    ? `<div style="color:var(--muted);font-size:13px;padding:16px 0">Không có dữ liệu</div>`
    : staffArr.map(([name, d]) => {
        const pct = Math.round(d.pts/maxPts*100);
        const initials = name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
        const hue = name.split('').reduce((a,c)=>a+c.charCodeAt(0),0) % 360;
        return `
        <div class="staff-row">
          <div class="staff-avatar" style="background:hsl(${hue},60%,92%);color:hsl(${hue},50%,35%)">${initials}</div>
          <div class="staff-name">${name}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${projColor}"></div></div>
          <div class="staff-meta">
            <span class="staff-pts">${d.pts.toFixed(0)} đ</span>
            <span class="staff-count">${d.done}/${d.total} bài</span>
          </div>
        </div>`;
      }).join('');
}

/* ══════════════════════════════════════════
   RENDER CHARTS
   ══════════════════════════════════════════ */
const MONTHS_LABEL = { '01':'T1','02':'T2','03':'T3','04':'T4','05':'T5','06':'T6','07':'T7','08':'T8','09':'T9','10':'T10','11':'T11','12':'T12' };
const projAccent = () => state.project==='biolizin' ? '#16a34a' : state.project==='ferrolip' ? '#2563eb' : '#6366f1';

function buildProgressChart() {
  const key  = state.task==='new' ? 'new_content' : 'audit_content';
  const data = rawData[key].filter(r =>
    state.project==='all' || (r.project||'').toLowerCase()===state.project
  );
  // Group by month — all months hiện có
  const monthMap = {};
  data.forEach(r => {
    const t = (r.time||'').trim();
    const m = t.slice(0,2); // "01" "02" ...
    if (!m || isNaN(m)) return;
    if (!monthMap[m]) monthMap[m] = { done:0, total:0 };
    monthMap[m].total++;
    if (normalizeStatus(r.status)==='done') monthMap[m].done++;
  });
  const labels = Object.keys(monthMap).sort().map(m => MONTHS_LABEL[m]||m);
  const doneData  = Object.keys(monthMap).sort().map(m => monthMap[m].done);
  const totalData = Object.keys(monthMap).sort().map(m => monthMap[m].total);
  const accent = projAccent();

  if (charts.progress) charts.progress.destroy();
  charts.progress = new Chart(document.getElementById('progressChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label:'Kế hoạch', data:totalData, backgroundColor:'#f1f0ec', borderRadius:4, borderSkipped:false },
        { label:'Hoàn thành', data:doneData, backgroundColor:accent+'cc', borderRadius:4, borderSkipped:false },
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ display:true, labels:{ color:'#7a7770', boxWidth:10, font:{size:11,family:"'Instrument Sans'"} } } },
      scales:{
        x:{ grid:{display:false}, ticks:{ color:'#7a7770', font:{size:11} } },
        y:{ grid:{ color:'#f1f0ec' }, ticks:{ color:'#7a7770', font:{size:11} }, beginAtZero:true }
      }
    }
  });
  document.getElementById('chartSubtitle').textContent =
    state.project==='all' ? 'tất cả dự án' : state.project+'.vn';
}

function buildPointChart(rows) {
  const map = {};
  rows.forEach(r => {
    const n = r.nhan_su||'?';
    map[n] = (map[n]||0) + (parseFloat(r.content_point)||0);
  });
  const sorted  = Object.entries(map).sort((a,b)=>b[1]-a[1]);
  const labels  = sorted.map(([n])=>n);
  const values  = sorted.map(([,v])=>v);
  const accent  = projAccent();
  const colors  = values.map((_,i) => i===0 ? accent : accent+'66');

  if (charts.point) charts.point.destroy();
  charts.point = new Chart(document.getElementById('pointChart'), {
    type:'bar',
    data:{ labels, datasets:[{ data:values, backgroundColor:colors, borderRadius:5, borderSkipped:false }] },
    options:{
      indexAxis:'y', responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false} },
      scales:{
        x:{ grid:{color:'#f1f0ec'}, ticks:{color:'#7a7770',font:{size:11}}, beginAtZero:true },
        y:{ grid:{display:false}, ticks:{color:'#1a1916',font:{size:12,weight:'500'}} }
      }
    }
  });
}

/* ══════════════════════════════════════════
   MAIN RENDER
   ══════════════════════════════════════════ */
function render() {
  const rows = getFilteredData();
  renderKPI(rows);
  renderTable(rows);
  renderStaff(rows);
  buildProgressChart();
  buildPointChart(rows);
}

/* ══════════════════════════════════════════
   CONTROLS
   ══════════════════════════════════════════ */
function setMonth(el, m) {
  document.querySelectorAll('.m-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  state.month = m;
  render();
}
function setProject(el, p) {
  document.querySelectorAll('.proj-tab').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  state.project = p;
  render();
}
function setTask(el, t) {
  document.querySelectorAll('.t-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  state.task = t;
  render();
}

/* ══════════════════════════════════════════
   INIT
   ══════════════════════════════════════════ */
async function init() {
  document.getElementById('syncStatus').textContent = 'Đang tải...';
  const [newData, auditData] = await Promise.all([
    fetchSheet('new_content'),
    fetchSheet('audit_content'),
  ]);
  rawData.new_content   = newData   || DEMO.new_content;
  rawData.audit_content = auditData || DEMO.audit_content;

  const isDemo = !newData && !auditData;
  document.getElementById('syncStatus').innerHTML = isDemo
    ? '<span style="color:#d97706">⚠ Dùng dữ liệu mẫu</span>'
    : '<span style="color:var(--done)">✓ Đã đồng bộ</span>';

  render();
}

init();
</script>
</body>
</html>
